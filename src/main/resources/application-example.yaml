## ⚠️ File mẫu - KHÔNG chứa giá trị thật
## Copy file này thành application.yaml và điền giá trị thật vào

server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  output.ansi.enabled: ALWAYS
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/store
    username: your_db_username
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: localhost
      port: 6379
      password: "your_redis_password"
      database: 0
      timeout: 5s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 0
          max-wait: 2s
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: "your_app_password"       # Google App Password (16 ký tự)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: store-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

logging:
  level:
    root: info

jwt:
  signerKey: "your_jwt_signer_key_base64"   # Tạo bằng: openssl rand -base64 48
  access-duration: 3600                      # seconds (1 hour)
  refresh-duration: 2592000                  # seconds (30 days)

cloudinary:
  cloud-name: your_cloud_name
  api-key: your_cloudinary_api_key
  api-secret: your_cloudinary_api_secret

management:
  endpoints:
    web:
      exposure:
        include: health,info

# SePay Payment Gateway Configuration
sepay:
  api-key: "YOUR_SEPAY_API_KEY"
  bank-code: "MBBank"
  bank-account-number: "0123456789"
  bank-account-name: "NGUYEN VAN A"
  bank-name: "MB Bank"

# Google OAuth2 Configuration
# Lấy từ Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client IDs
google:
  client-id: "YOUR_GOOGLE_CLIENT_ID"
  client-secret: "YOUR_GOOGLE_CLIENT_SECRET"
  redirect-uri: "http://localhost:3000/auth/google/callback"

app:
  kafka:
    topics:
      order-created: order.created
      order-status-changed: order.status.changed
